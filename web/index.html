        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        .preloader {
            width: 100%;
            height: 100vh;
            margin: 0 auto;
            background: linear-gradient(135deg, #FF8F00 0%, #FFB300 40%, #FFD54F 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        .preloader .orb {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            filter: blur(40px);
        }
        
        .preloader .orb-1 {
            width: 200px;
            height: 200px;
            top: 10%;
            left: -10%;
            animation: float 8s ease-in-out infinite;
        }
        
        .preloader .orb-2 {
            width: 150px;
            height: 150px;
            bottom: 20%;
            right: -5%;
            animation: float 10s ease-in-out infinite 2s;
        }
        
        .preloader .orb-3 {
            width: 100px;
            height: 100px;
            top: 40%;
            right: 20%;
            animation: float 6s ease-in-out infinite 1s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }
        
        .preloader .logo-wrapper {
            position: relative;
            margin-bottom: 32px;
            animation: scaleIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        @keyframes scaleIn {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        .preloader .logo-main {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.2),
                0 0 0 20px rgba(255,255,255,0.1),
                0 0 0 40px rgba(255,255,255,0.05);
            position: relative;
            transform: rotate(3deg);
            animation: logoPulse 3s ease-in-out infinite;
        }
        
        @keyframes logoPulse {
            0%, 100% { transform: rotate(3deg) scale(1); }
            50% { transform: rotate(-3deg) scale(1.05); }
        }
        
        .preloader .logo-icon {
            width: 60px;
            height: 60px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .preloader .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(255, 179, 0, 0.3));
        }
        
        .preloader .time-badge {
            position: absolute;
            bottom: -8px;
            right: -8px;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #004080, #005A9C);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 90, 156, 0.4);
            border: 4px solid white;
            animation: badgeBounce 2s ease-in-out infinite;
        }
        
        @keyframes badgeBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .preloader .time-badge .number {
            font-size: 18px;
            font-weight: 900;
            color: white;
            line-height: 1;
        }
        
        .preloader .time-badge .text {
            font-size: 8px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .preloader .brand-name {
            font-size: 46px;
            font-weight: 900;
            color: white;
            letter-spacing: -1px;
            margin-bottom: 8px;
            opacity: 0;
            animation: slideUp 0.6s ease-out 0.4s forwards;
            text-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .preloader .tagline {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 48px;
            opacity: 0;
            animation: slideUp 0.6s ease-out 0.6s forwards;
        }
        
        .preloader .loader-container {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 16px;
            opacity: 0;
            animation: slideUp 0.6s ease-out 0.8s forwards;
        }
        
        .preloader .loader-bar {
            height: 100%;
            width: 30%;
            background: white;
            border-radius: 10px;
            animation: loadProgress 1.5s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            position: relative;
        }
        
        @keyframes loadProgress {
            0% { left: -30%; }
            100% { left: 100%; }
        }
        
        .preloader .loader-text {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
            opacity: 0;
            animation: slideUp 0.6s ease-out 1s forwards;
        }
        
        .preloader .bottom-info {
            position: absolute;
            bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            animation: slideUp 0.6s ease-out 1.2s forwards;
        }
        
        .preloader .bottom-info span {
            font-size: 11px;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }
        
        .preloader .bottom-info .dot {
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
        }
        
        .preloader .bottom-info i {
            color: rgba(255,255,255,0.9);
            font-size: 10px;
        }
  </style>

  <script>
    // Check if localStorage is supported in the browser
      if (typeof(Storage) !== "undefined") {
        // Get the item from localStorage
        var itemValue = localStorage.getItem("flutter.apnademand_theme");
        // Check if the item exists
        if (itemValue !== null) {
          // Check the value of the item
          if (itemValue === "true") {
            // If the value is "true", add a class to the body
            document.body.classList.add("theme-dark");
          } else {
            // If the value is not "true", remove the class from the body
            document.body.classList.remove("theme-light");
          }
        } else {
          console.log("Item not found in localStorage");
        }
      } else {
        console.log("localStorage is not supported in this browser");
      }

  </script>

  <script>
    document.querySelectorAll("img.svg").forEach(function (img) {
    var imgID = img.getAttribute("id");
    var imgClass = img.getAttribute("class");
    var imgURL = img.getAttribute("src");
    // Create a new XMLHttpRequest
    var xhr = new XMLHttpRequest();
    xhr.open("GET", imgURL, true);
    // Set the responseType to "document" to parse the response as an XML document
    xhr.responseType = "document";
    xhr.onload = function () {
      if (xhr.status === 200) {
        var data = xhr.response;
        // Get the SVG tag from the response, ignore the rest
        var svg = data.querySelector("svg");
        // Add replaced image's ID to the new SVG
        if (typeof imgID !== "undefined") {
          svg.setAttribute("id", imgID);
        }
        // Add replaced image's classes to the new SVG
        if (typeof imgClass !== "undefined") {
          svg.setAttribute("class", imgClass + " replaced-svg");
        }
        // Remove any invalid XML tags
        svg.removeAttribute("xmlns:a");
        // Check if the viewport is set; set it if not
        if (!svg.getAttribute("viewBox") && svg.getAttribute("height") && svg.getAttribute("width")) {
          svg.setAttribute("viewBox", "0 0 " + svg.getAttribute("height") + " " + svg.getAttribute("width"));
        }
        // Replace the image with the new SVG
        img.parentNode.replaceChild(svg, img);
      }
    };
    xhr.send();
  });
  </script>
